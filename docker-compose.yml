services:
  web:
    build: .
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      # Two options: SQLite (default) or Postgres (recommended for production)
      # To use SQLite (bind mount ./data): DATABASE_URL=sqlite:////data/sorteios.db
      # To use Postgres service below (production): set DATABASE_URL to postgres://postgres:postgres@db:5432/sorteios
      DATABASE_URL: "sqlite:////data/sorteios.db"
      LOG_LEVEL: "warning"
    volumes:
      # Persist database and uploads on host.
      - ./data:/data
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --workers 1 --log-level warning --no-access-log

  db:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: sorteios
    volumes:
      - sorteios_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL","pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  sorteios_data: {}
  sorteios_pgdata: {}
