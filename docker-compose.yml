services:
  web:
    build: .
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      # Using PostgreSQL (recommended for all environments)
      DATABASE_URL: "postgresql://postgres:postgres@db:5432/sorteios"
      LOG_LEVEL: "warning"
    volumes:
      # Persist uploads on host.
      - ./data/uploads:/data/uploads
    depends_on:
      db:
        condition: service_healthy
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --workers 1 --log-level warning --no-access-log

  db:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: sorteios
    volumes:
      - sorteios_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL","pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  sorteios_data: {}
  sorteios_pgdata: {}
