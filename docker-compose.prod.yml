version: "3.9"

services:
  web:
    image: ${IMAGE_PREFIX}:${IMAGE_TAG:-latest}
    restart: always
    ports:
      - "127.0.0.1:8000:8000"
    environment:
      DATABASE_URL: "postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/sorteios"
      LOG_LEVEL: "${LOG_LEVEL:-info}"
      SESSION_SECRET: "${SESSION_SECRET}"
      ADMIN_API_KEY: "${ADMIN_API_KEY}"
      ENVIRONMENT: "${ENVIRONMENT:-production}"
      DEBUG: "${DEBUG:-False}"
      ALLOWED_HOSTS: "sorteio.overflowmvmt.com,localhost"
      CORS_ORIGINS: "https://sorteio.overflowmvmt.com"
    volumes:
      - sorteios_data:/data
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - sorteios_network

  db:
    image: postgres:15-alpine
    restart: always
    environment:
      POSTGRES_USER: "${POSTGRES_USER}"
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD}"
      POSTGRES_DB: sorteios
    volumes:
      - sorteios_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - sorteios_network

  nginx:
    image: nginx:alpine
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./certs:/etc/nginx/certs:ro
    depends_on:
      - web
    networks:
      - sorteios_network

volumes:
  sorteios_data: {}
  sorteios_pgdata: {}

networks:
  sorteios_network:
    driver: bridge
