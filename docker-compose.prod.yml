services:
  web:
    image: ${IMAGE_PREFIX}:${IMAGE_TAG:-latest}
    pull_policy: always
    restart: always
    environment:
      DATABASE_URL: "postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/sorteios"
      LOG_LEVEL: "${LOG_LEVEL:-info}"
      SESSION_SECRET: "${SESSION_SECRET}"
      SECRET_KEY: "${SESSION_SECRET}"
      COOKIE_SECRET: "${SESSION_SECRET}"
      ADMIN_API_KEY: "${ADMIN_API_KEY}"
      ADMIN_EMAIL: "${ADMIN_EMAIL:-}"
      ADMIN_PASSWORD: "${ADMIN_PASSWORD:-}"
      BASE_URL: "${BASE_URL:-https://sorteio.overflowmvmt.com}"
      SMTP_HOST: "${SMTP_HOST:-}"
      SMTP_PORT: "${SMTP_PORT:-587}"
      SMTP_USER: "${SMTP_USER:-}"
      SMTP_PASS: "${SMTP_PASS:-}"
      SMTP_FROM: "${SMTP_FROM:-}"
      SMTP_FROM_NAME: "${SMTP_FROM_NAME:-Sorteios}"
      ENVIRONMENT: "${ENVIRONMENT:-production}"
      DEBUG: "${DEBUG:-False}"
      ALLOWED_HOSTS: "sorteio.overflowmvmt.com,localhost"
      CORS_ORIGINS: "https://sorteio.overflowmvmt.com"
    volumes:
      - sorteios_data:/data
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    labels:
      - traefik.enable=true
      - traefik.http.routers.sorteios.rule=Host(`sorteio.overflowmvmt.com`)
      - traefik.http.routers.sorteios.entrypoints=websecure
      - traefik.http.routers.sorteios.tls.certresolver=letsencrypt
      - traefik.http.services.sorteios.loadbalancer.server.port=8000

  db:
    image: postgres:15-alpine
    restart: always
    environment:
      POSTGRES_USER: "${POSTGRES_USER}"
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD}"
      POSTGRES_DB: sorteios
    volumes:
      - sorteios_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  sorteios_data: {}
  sorteios_pgdata: {}
